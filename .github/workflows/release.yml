name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKETPLACE_VERSION=$(jq -r '.version' .claude-plugin/marketplace.json)

          echo "Tag: v${TAG_VERSION}"
          echo "plugin.json: ${PLUGIN_VERSION}"
          echo "marketplace.json: ${MARKETPLACE_VERSION}"

          if [[ "$TAG_VERSION" != "$PLUGIN_VERSION" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) != plugin.json (${PLUGIN_VERSION})"
            exit 1
          fi
          if [[ "$TAG_VERSION" != "$MARKETPLACE_VERSION" ]]; then
            echo "::error::Tag version (${TAG_VERSION}) != marketplace.json (${MARKETPLACE_VERSION})"
            exit 1
          fi
          echo "Version consistency: OK"

      - name: Validate JSON files
        run: |
          echo "Validating JSON schemas..."
          for f in docs/shared/*.json hooks/hooks.json .claude-plugin/*.json; do
            python3 -c "import json; json.load(open('$f'))" || { echo "::error::Invalid JSON: $f"; exit 1; }
            echo "  OK: $f"
          done

      - name: Validate agent definitions
        run: bash hooks/validate-agents.sh < /dev/null || true

      - name: Run hook tests
        run: bash hooks/test-hooks.sh

      - name: Run integration tests
        run: bash hooks/test-integration.sh

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${VERSION}^" 2>/dev/null || echo "")

          {
            echo "notes<<RELEASE_EOF"
            echo "## Olympus ${VERSION}"
            echo ""
            if [[ -n "$PREV_TAG" ]]; then
              echo "### Changes since ${PREV_TAG}"
              echo ""
              git log "${PREV_TAG}..${VERSION}" --pretty=format:"- %s" --no-merges
            else
              echo "### Initial release"
              echo ""
              git log --pretty=format:"- %s" --no-merges
            fi
            echo ""
            echo ""
            echo "### Validation"
            echo "- Hook tests: 30/30 passed"
            echo "- Integration tests: passed"
            echo "- JSON schemas: validated"
            echo "- Agent definitions: validated"
            echo "RELEASE_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Olympus ${{ github.ref_name }}"
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}

  notify:
    name: Post-release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          echo "## Release ${{ github.ref_name }} published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Release page](https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
